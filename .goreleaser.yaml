version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env: ["CGO_ENABLED=0"]
    binary: deeptag
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

kos:
  - repositories: [ghcr.io/staicey/deeptag]
    tags:
      - "{{.Version}}"
      - latest
    bare: true
    preserve_import_paths: false
    platforms:
      - linux/amd64
      - linux/arm64


